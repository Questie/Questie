name: CI

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      repo_full_name:
        required: true
        type: string
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  luacheck:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
      - name: Checkout project
        uses: actions/checkout@v6.0.2

      - name: Install Lua and Luacheck
        run: sudo apt-get install lua5.1 lua-check

      - name: Run Luacheck
        run: luacheck -q -- Database Localization Modules Public Questie.lua

  unit-tests:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    env:
      TZ: Europe/Berlin

    steps:
      - name: Checkout project
        uses: actions/checkout@v6.0.2

      - name: Install Lua and luarocks
        run: sudo apt-get install lua5.1 luarocks

      - name: Install luarocks packages
        run: |
          sudo luarocks install bit32
          sudo luarocks install busted
          sudo luarocks install luafilesystem

      - name: Run busted Unit Tests
        run: busted -p ".test.lua" .

  db-validation:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    env:
      TZ: Europe/Berlin
    strategy:
      matrix:
        expansion: [era, sod, tbc, wotlk, mop, localization]
      fail-fast: false

    steps:
      - name: Checkout project
        uses: actions/checkout@v6.0.2

      - name: Install Lua and luarocks
        run: sudo apt-get install lua5.1 luarocks

      - name: Install luarocks packages
        run: |
          sudo luarocks install bit32
          sudo luarocks install luafilesystem

      - name: Validate ${{ matrix.expansion }} database
        run: lua cli/validate-${{ matrix.expansion }}.lua

      - name: Upload correction files
        uses: actions/upload-artifact@v7.0.1
        with:
          name: correction-files-${{ matrix.expansion }}
          path: cli/output/
        if: success() || failure()

  notify:
    runs-on: ubuntu-latest
    needs: [luacheck, unit-tests, db-validation]
    if: failure()

    steps:
      - name: Send CI failure to Discord
        uses: nebularg/actions-discord-webhook@v1.0.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
